<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Contact</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen bg-purple-50 text-slate-900">

<div th:replace="~{fragments :: navbar('contact')}"></div>

<main class="mx-auto max-w-3xl px-6 py-12">

    <section class="rounded-3xl border border-purple-100 bg-white p-8 shadow-sm">
        <p class="text-sm font-semibold uppercase tracking-wide text-purple-700">
            Contact
        </p>

        <h1 class="mt-3 text-4xl font-bold text-purple-950">
            Stuur ons een bericht
        </h1>

        <p class="mt-4 text-slate-600">
            Heb je een vraag, een idee voor een activiteit of wil je graag meehelpen?
            Laat hier iets achter. We bekijken je bericht zo snel mogelijk.
        </p>

        <div th:if="${sent}" class="mt-6 rounded-2xl border border-green-200 bg-green-50 p-5 text-green-800">
            Bedankt
            <span th:if="${name}" th:text="${name}">naam</span>.
            je bericht is goed aangekomen. We nemen binnenkort contact op.
        </div>

        <form th:action="@{/contact}" method="post" class="mt-8 space-y-6">

            <div>
                <label for="name" class="block text-sm font-semibold text-slate-700">
                    Naam
                </label>
                <input type="text"
                       id="name"
                       name="name"
                       required
                       placeholder="Je naam"
                       class="mt-2 w-full rounded-xl border border-purple-200 px-4 py-3 focus:border-purple-500 focus:outline-none focus:ring-2 focus:ring-purple-100">
            </div>

            <div>
                <label for="email" class="block text-sm font-semibold text-slate-700">
                    E-mailadres
                </label>
                <input type="email"
                       id="email"
                       name="email"
                       required
                       placeholder="naam@example.be"
                       class="mt-2 w-full rounded-xl border border-purple-200 px-4 py-3 focus:border-purple-500 focus:outline-none focus:ring-2 focus:ring-purple-100">
            </div>

            <div>
                <label for="subject" class="block text-sm font-semibold text-slate-700">
                    Onderwerp
                </label>
                <input type="text"
                       id="subject"
                       name="subject"
                       required
                       placeholder="Onderwerp van je bericht"
                       class="mt-2 w-full rounded-xl border border-purple-200 px-4 py-3 focus:border-purple-500 focus:outline-none focus:ring-2 focus:ring-purple-100">
            </div>

            <div>
                <label for="message" class="block text-sm font-semibold text-slate-700">
                    Bericht
                </label>
                <textarea id="message"
                          name="message"
                          required
                          rows="6"
                          placeholder="Schrijf hier je bericht..."
                          class="mt-2 w-full rounded-xl border border-purple-200 px-4 py-3 focus:border-purple-500 focus:outline-none focus:ring-2 focus:ring-purple-100"></textarea>
            </div>

            <div class="flex flex-col gap-3 pt-4 sm:flex-row sm:items-center sm:justify-between">
                <a href="/"
                   class="w-full rounded-xl border border-purple-200 px-5 py-3 text-center font-medium text-purple-900 hover:bg-purple-100 sm:w-auto">
                    Annuleren
                </a>

                <button type="submit"
                        class="w-full rounded-xl bg-purple-800 px-5 py-3 text-center font-medium text-white shadow-sm hover:bg-purple-900 sm:w-auto">
                    Verstuur bericht
                </button>
            </div>

        </form>
    </section>

</main>

<div th:replace="~{fragments :: footer}"></div>

</body>
</html>
